name: Upload coverage reports to Codecov

on:
  push:
    branches: [main]
  pull_request:

jobs:
  upload-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check coverage report
        id: coverage_file
        run: |
          if [ -f coverage/cobertura.xml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Coverage file found: coverage/cobertura.xml"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "coverage/cobertura.xml is missing; skipping Codecov upload."
          fi

      - name: Coverage diagnostics
        if: always()
        run: |
          echo "## Coverage diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- found output: \`${{ steps.coverage_file.outputs.found }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- git tracked coverage files:" >> "$GITHUB_STEP_SUMMARY"
          git ls-files coverage >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Directory listing:" >> "$GITHUB_STEP_SUMMARY"
          ls -la coverage >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "coverage directory not present" >> "$GITHUB_STEP_SUMMARY"

      - name: Normalize Cobertura source paths
        if: steps.coverage_file.outputs.found == 'true'
        run: |
          sed -i 's|<source>.*</source>|<source>.</source>|g' coverage/cobertura.xml
          echo "Normalized cobertura <source> entries to repo-relative path."

      - name: Upload to Codecov
        if: steps.coverage_file.outputs.found == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
