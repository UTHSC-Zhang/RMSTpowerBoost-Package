name: Upload coverage reports to Codecov

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  upload-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check coverage report
        id: coverage_file
        run: |
          if [ -f coverage/cobertura.xml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Coverage file found: coverage/cobertura.xml"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "coverage/cobertura.xml is missing; skipping Codecov upload."
          fi

      - name: Coverage diagnostics
        if: always()
        run: |
          echo "## Coverage diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- found output: \`${{ steps.coverage_file.outputs.found }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- git tracked coverage files:" >> "$GITHUB_STEP_SUMMARY"
          git ls-files coverage >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Directory listing:" >> "$GITHUB_STEP_SUMMARY"
          ls -la coverage >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "coverage directory not present" >> "$GITHUB_STEP_SUMMARY"

      - name: Normalize Cobertura paths
        if: steps.coverage_file.outputs.found == 'true'
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys
          import xml.etree.ElementTree as ET

          report = "coverage/cobertura.xml"
          tree = ET.parse(report)
          root = tree.getroot()

          # Remove source roots so filenames are interpreted as repo-relative.
          sources = root.find(".//sources")
          if sources is not None:
              root.remove(sources)

          missing = set()
          classes = root.findall(".//class")
          if not classes:
              print("ERROR: No <class> entries found in cobertura.xml after normalization.")
              sys.exit(1)

          for cls in classes:
              fn = (cls.get("filename") or "").replace("\\", "/")
              fn = re.sub(
                  r"^[A-Za-z]:/.*/RMSTpowerBoost-Package/",
                  "",
                  fn,
                  flags=re.IGNORECASE,
              )
              fn = fn.lstrip("./")
              cls.set("filename", fn)
              if fn and not os.path.exists(fn):
                  missing.add(fn)

          tree.write(report, encoding="utf-8", xml_declaration=True)
          print(f"classes={len(classes)}")
          print(f"missing_files={len(missing)}")
          for item in sorted(missing):
              print(f"missing:{item}")
          if missing:
              print("ERROR: Cobertura contains filenames that do not exist in the repository.")
              sys.exit(1)
          PY

      - name: Coverage mapping diagnostics
        if: steps.coverage_file.outputs.found == 'true'
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Post-normalization XML preview:" >> "$GITHUB_STEP_SUMMARY"
          head -n 40 coverage/cobertura.xml >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Cobertura filenames not found in repo:" >> "$GITHUB_STEP_SUMMARY"
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import os
          import xml.etree.ElementTree as ET
          root = ET.parse("coverage/cobertura.xml").getroot()
          missing = sorted({
              (c.get("filename") or "").replace("\\", "/")
              for c in root.findall(".//class")
              if (c.get("filename") or "") and not os.path.exists((c.get("filename") or "").replace("\\", "/"))
          })
          if not missing:
              print("- none")
          else:
              for m in missing:
                  print(f"- {m}")
          PY

      - name: Upload to Codecov
        if: steps.coverage_file.outputs.found == 'true'
        uses: codecov/codecov-action@v6
        with:
          slug: UTHSC-Zhang/RMSTpowerBoost-Package
          files: coverage/cobertura.xml
          disable_search: true
          use_oidc: true
          fail_ci_if_error: true
          verbose: true
