name: Compatibility Matrix

on:
  push:
    paths-ignore:
      - "README.md"

permissions:
  contents: write

jobs:
  compatibility:
    if: github.actor != 'github-actions[bot]'
    name: ${{ matrix.os }} | R ${{ matrix.r }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, windows-2022, macos-13, macos-14]
        r: ["4.1", "4.2", "4.3", "4.4", "4.5"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'

      - name: Run compatibility check
        id: compatibility_check
        shell: bash
        run: |
          set +e
          Rscript -e "install.packages('.', repos='https://cloud.r-project.org', type='source')"
          status=$?
          if [ "$status" -eq 0 ]; then
            Rscript -e "library(RMSTpowerBoost)"
            status=$?
          fi

          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            echo "result=✅ Pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=❌ Fail" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Save matrix result
        if: always()
        shell: bash
        run: |
          mkdir -p compatibility-results
          cat <<'JSON' > "compatibility-results/${{ matrix.os }}--${{ matrix.r }}.json"
          {
            "os": "${{ matrix.os }}",
            "r": "${{ matrix.r }}",
            "result": "${{ steps.compatibility_check.outputs.result }}"
          }
          JSON

      - name: Upload matrix result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-result-${{ matrix.os }}-${{ matrix.r }}
          path: compatibility-results/*.json
          if-no-files-found: error
          retention-days: 7

      - name: Fail job when compatibility check fails
        if: always() && steps.compatibility_check.outputs.exit_code != '0'
        shell: bash
        run: exit 1

  update-readme:
    if: always() && github.actor != 'github-actions[bot]'
    needs: compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download matrix results
        uses: actions/download-artifact@v4
        with:
          pattern: compatibility-result-*
          path: compatibility-results
          merge-multiple: true

      - name: Update compatibility matrix in README
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          os_versions = ["ubuntu-22.04", "ubuntu-24.04", "windows-2022", "macos-13", "macos-14"]
          r_versions = ["4.1", "4.2", "4.3", "4.4", "4.5"]
          marker_start = "<!-- compatibility-matrix:start -->"
          marker_end = "<!-- compatibility-matrix:end -->"

          result_map = {}
          for json_file in Path("compatibility-results").rglob("*.json"):
            with json_file.open("r", encoding="utf-8") as fh:
              item = json.load(fh)
            result_map[(item["os"], item["r"])] = item["result"]

          lines = []
          lines.append(f"_Last updated from [workflow run]({os.environ['RUN_URL']})._")
          lines.append("")
          lines.append("| OS \\\\ R | " + " | ".join(r_versions) + " |")
          lines.append("|---|---|---|---|---|---|")
          for os_name in os_versions:
            row = [result_map.get((os_name, r_version), "⚪ Not run") for r_version in r_versions]
            lines.append("| " + os_name + " | " + " | ".join(row) + " |")

          block = "\n".join(lines)
          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          pattern = re.compile(
            rf"{re.escape(marker_start)}.*?{re.escape(marker_end)}",
            flags=re.DOTALL,
          )
          replacement = f"{marker_start}\n{block}\n{marker_end}"
          updated = pattern.sub(replacement, readme, count=1)
          if updated == readme:
            raise SystemExit("Compatibility markers were not found in README.md.")
          readme_path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit README update
        run: |
          if git diff --quiet -- README.md; then
            echo "No README update needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update compatibility matrix"
          git push
