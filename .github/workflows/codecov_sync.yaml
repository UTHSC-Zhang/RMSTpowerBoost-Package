name: Upload coverage reports to Codecov

on:
  push:
    branches: [main]
  pull_request:

jobs:
  upload-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure coverage artifact exists
        run: |
          if [ -f coverage/cobertura.xml ]; then
            echo "Found coverage/cobertura.xml"
          else
            echo "Missing coverage/cobertura.xml. Generate it locally before pushing."
            exit 1
          fi

      - name: Upload coverage artifact to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: arnabaich96/RMSTpowerBoost-Package
          files: coverage/cobertura.xml
          disable_search: true
          fail_ci_if_error: true
