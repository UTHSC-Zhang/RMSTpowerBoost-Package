name: Upload coverage reports to Codecov

on:
  push:
    branches: [main]
  pull_request:

jobs:
  upload-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Check coverage report
        id: coverage_file
        run: |
          if [ -f coverage/cobertura.xml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Coverage file found: coverage/cobertura.xml (prebuilt artifact)"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "coverage/cobertura.xml is missing. Commit/save coverage artifacts before this workflow runs."
            exit 1
          fi

      - name: Save coverage artifacts
        if: steps.coverage_file.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage/cobertura.xml
            coverage/coverage.rds
          if-no-files-found: error

      - name: Coverage diagnostics
        if: always()
        run: |
          echo "## Coverage diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- found output: \`${{ steps.coverage_file.outputs.found }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- git tracked coverage files:" >> "$GITHUB_STEP_SUMMARY"
          git ls-files coverage >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Directory listing:" >> "$GITHUB_STEP_SUMMARY"
          ls -la coverage >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "coverage directory not present" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to Codecov
        if: steps.coverage_file.outputs.found == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          override_branch: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          override_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
