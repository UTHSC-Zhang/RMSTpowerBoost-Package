name: Sync app artifacts from RMSTpowerBoost-App

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  sync-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout package repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::testthat
            any::covr
            any::roxygen2
          needs: check

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: UTHSC-Zhang/RMSTpowerBoost-App
          path: RMSTpowerBoost-App
          token: ${{ secrets.PACKAGE_REPO_TOKEN }}

      - name: Sync app payload
        run: Rscript tools/sync_app_from_repo.R RMSTpowerBoost-App

      - name: Validate synced app
        run: Rscript tools/validate_synced_app.R

      - name: Smoke tests and coverage gate
        run: |
          Rscript -e "testthat::test_local('.', reporter='summary')"
          Rscript tools/generate_coverage_artifacts.R
          Rscript tools/check_coverage_thresholds.R

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PACKAGE_REPO_TOKEN }}
          commit-message: "sync: update app payload from RMSTpowerBoost-App"
          title: "sync: app payload from RMSTpowerBoost-App"
          body: |
            Automated sync from RMSTpowerBoost-App.

            Checklist:
            - [x] app sync
            - [x] validation passed
            - [x] tests pass
            - [x] coverage gate pass
          branch: bot/sync-app-from-repo
          labels: |
            app sync
            coverage gate
            tests pass
